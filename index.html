<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F8E1E7" />
  <meta name="description" content="Mr & Mrs De Vera Wedding - June 3, 2026. Share your moments with us!" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <title>Mr & Mrs De Vera | June 3, 2026</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAF9F6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #FAF9F6; }
    ::-webkit-scrollbar-thumb { background: #E6C9A8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #C9A9B6; }

    /* Loading animation */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #FAF9F6;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loading-heart {
      width: 40px;
      height: 40px;
      position: relative;
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    .loading-heart::before,
    .loading-heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 32px;
      background: #E6C9A8;
      border-radius: 20px 20px 0 0;
      transform-origin: bottom center;
    }
    .loading-heart::before {
      left: 20px;
      transform: rotate(-45deg);
    }
    .loading-heart::after {
      left: 0;
      transform: rotate(45deg);
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <div class="loading-heart"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
      }, 1500);
    });
  </script>
</body>
</html>
